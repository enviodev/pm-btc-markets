type OrderFill {
  id: ID!
  orderHash: String!
  maker: String!
  taker: String!
  side: Int!                           # 0=BUY, 1=SELL
  market: Market!                      # active 5-min market the fill belongs to
  price: String!                       # price per share in USDC (6 decimals)
  makerAmountFilled: BigInt!
  takerAmountFilled: BigInt!
  fee: BigInt!
  builder: String!                     # builder code (bytes32)
  metadata: String!                    # metadata (bytes32)
  exchange: String!                    # source exchange address
  timestamp: Int!
  blockNumber: Int!
  transactionHash: String!
  txFrom: String!                      # transaction sender
}

type Market {
  id: ID!                              # clobTokenId (decimal uint256 string)
  conditionId: String!
  slug: String!                        # gamma event slug, e.g. btc-updown-5m-1777824900
  slotTimestamp: Int! @index           # slug's unix timestamp (5-min aligned)
  endDate: Int! @index                 # market resolution unix seconds
  outcome: String!                     # "Up" or "Down"
}